name: Bundle Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bundle-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: 777genius/plugin-kit-ai/setup-plugin-kit-ai@v1

      - name: Doctor
        run: plugin-kit-ai doctor .

      - name: Bootstrap
        run: plugin-kit-ai bootstrap .

      - name: Validate
        run: plugin-kit-ai validate . --platform codex-runtime --strict

      - name: Publish Bundle
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: plugin-kit-ai bundle publish . --platform codex-runtime --repo ${{ github.repository }} --tag ${{ github.ref_name }}
